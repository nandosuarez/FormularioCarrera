databases:
  - name: ruta-del-acordeon-10k-db
    plan: basic-256mb
    region: ohio
    databaseName: ruta_del_acordeon_10k
    user: ruta_admin

services:
  - type: web
    name: ruta-del-acordeon-10k
    runtime: node
    plan: starter
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: ruta-del-acordeon-10k-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: EVENT_NAME
        value: Carrera Atletica Ruta del Acordeon 10K - 2026
      - key: EVENT_DATE
        sync: false
      - key: EVENT_TIME
        sync: false
      - key: EVENT_LOCATION
        sync: false
      - key: EVENT_CONTACT_EMAIL
        sync: false
      - key: EVENT_CONTACT_PHONE
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
